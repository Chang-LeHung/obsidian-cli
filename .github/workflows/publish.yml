name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2.2" "twine>=6.1.0" "setuptools>=68"

      - name: Verify tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import pathlib
          import re

          pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r'^version = "([^"]+)"$', pyproject, re.MULTILINE)
          if not match:
              raise SystemExit("Unable to find project version in pyproject.toml")

          version = match.group(1)
          expected_tag = f"v{version}"
          actual_tag = "${{ github.ref_name }}"

          if actual_tag != expected_tag:
              raise SystemExit(
                  f"Tag {actual_tag} does not match project version {expected_tag}"
              )
          PY

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build distributions
        run: python -m build --no-isolation

      - name: Check distributions
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
